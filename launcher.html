<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vessel Thermal Mapping — Launcher</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'IBM Plex Sans',-apple-system,sans-serif;background:#f6f8fa;color:#1f2328}

/* ── UPDATE BANNER ── */
#update-banner{display:none;position:fixed;top:0;left:0;right:0;z-index:100;
  background:#1a7f37;color:#fff;padding:7px 16px;font-size:12px;font-weight:600;
  align-items:center;gap:10px;box-shadow:0 2px 6px rgba(0,0,0,.18)}
#update-banner.show{display:flex}
#update-banner span{flex:1}
#update-banner button{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);
  color:#fff;border-radius:5px;padding:3px 10px;font-size:11px;cursor:pointer;
  font-family:inherit;font-weight:600}
#update-banner button:hover{background:rgba(255,255,255,.35)}

/* ── HEADER BAR ── */
#header{position:fixed;left:0;right:0;height:36px;background:#ffffff;
  border-bottom:1px solid #d0d7de;display:flex;align-items:center;
  padding:0 14px;gap:0;z-index:50;box-shadow:0 1px 3px rgba(0,0,0,.06)}
#header-dot{width:8px;height:8px;border-radius:50%;background:#d0d7de;
  margin-right:8px;flex-shrink:0;transition:background .3s}
#header-dot.live{background:#1a7f37;box-shadow:0 0 6px rgba(26,127,55,.5)}
#header-dot.error{background:#f85149;box-shadow:0 0 6px rgba(248,81,73,.5)}
#version-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
  color:#ffffff;background:#0969da;padding:2px 9px;border-radius:10px;
  letter-spacing:.05em;margin-right:10px;white-space:nowrap}
#updated-label{font-size:11px;color:#57606a;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#reload-btn{padding:4px 12px;font-size:11px;font-weight:600;color:#0969da;
  background:#f0f7ff;border:1px solid #cce0ff;border-radius:5px;cursor:pointer;
  font-family:inherit;white-space:nowrap;transition:background .15s}
#reload-btn:hover{background:#dbeeff}
#reload-btn:disabled{opacity:.5;cursor:default}
#reload-btn.spinning::before{content:"◌ ";animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOADING OVERLAY ── */
#loading{position:fixed;inset:0;background:#f6f8fa;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;z-index:40}
#loading.hidden{display:none}
#loading-spinner{width:36px;height:36px;border:3px solid #d0d7de;border-top-color:#0969da;
  border-radius:50%;animation:spin .7s linear infinite}
#loading-msg{font-size:13px;color:#57606a;font-weight:500}
#loading-sub{font-size:11px;color:#afb8c1}

/* ── ERROR OVERLAY ── */
#error-panel{position:fixed;inset:0;background:#f6f8fa;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:12px;z-index:40;padding:32px}
#error-panel.show{display:flex}
#error-icon{font-size:36px;margin-bottom:4px}
#error-msg{font-size:14px;font-weight:700;color:#1f2328;text-align:center}
#error-detail{font-size:12px;color:#57606a;max-width:420px;text-align:center;line-height:1.6}
.error-btn{padding:9px 20px;font-size:12px;font-weight:600;border-radius:6px;
  cursor:pointer;font-family:inherit;border:none;transition:background .15s}
#retry-btn{background:#0969da;color:#fff}
#retry-btn:hover{background:#0758b3}
#cache-btn{background:#ffffff;color:#1f2328;border:1px solid #d0d7de;display:none}
#cache-btn:hover{background:#f0f7ff}

/* ── IFRAME ── */
#app-frame{position:fixed;left:0;right:0;bottom:0;border:none;
  background:#f6f8fa;opacity:0;transition:opacity .3s}
#app-frame.ready{opacity:1}
</style>
</head>
<body>

<!-- Update banner -->
<div id="update-banner">
  <span id="update-text"></span>
  <button onclick="dismissBanner()">✕ Dismiss</button>
</div>

<!-- Header bar -->
<div id="header">
  <div id="header-dot"></div>
  <span id="version-badge">Loading…</span>
  <span id="updated-label">Fetching latest from GitHub…</span>
  <button id="reload-btn" onclick="launch()" disabled>🔄 Reload</button>
</div>

<!-- Loading overlay -->
<div id="loading">
  <div id="loading-spinner"></div>
  <div id="loading-msg">Fetching latest version from GitHub…</div>
  <div id="loading-sub">raw.githubusercontent.com</div>
</div>

<!-- Error panel -->
<div id="error-panel">
  <div id="error-icon">⚠</div>
  <div id="error-msg">Could not reach GitHub</div>
  <div id="error-detail"></div>
  <div style="display:flex;gap:10px;margin-top:4px">
    <button class="error-btn" id="retry-btn" onclick="launch()">↺ Retry</button>
    <button class="error-btn" id="cache-btn" onclick="loadCache()">Open cached version</button>
  </div>
</div>

<!-- App iframe -->
<iframe id="app-frame" allowfullscreen></iframe>

<script>
const RAW_URL   = "https://raw.githubusercontent.com/jammu-ai/sru-vessel-thermal/master/vessel-multi-zone%20V3.html";
const API_URL   = "https://api.github.com/repos/jammu-ai/sru-vessel-thermal/commits?path=vessel-multi-zone+V3.html&per_page=1";
const LS_VER    = "vtm_last_version";
const LS_CACHE  = "vtm_cached_html";
const LS_DATE   = "vtm_last_date";

let currentBlobUrl = null;

/* ── DOM refs ── */
const banner      = document.getElementById("update-banner");
const updateText  = document.getElementById("update-text");
const headerDot   = document.getElementById("header-dot");
const versionBadge= document.getElementById("version-badge");
const updatedLabel= document.getElementById("updated-label");
const reloadBtn   = document.getElementById("reload-btn");
const loading     = document.getElementById("loading");
const loadingMsg  = document.getElementById("loading-msg");
const loadingSub  = document.getElementById("loading-sub");
const errorPanel  = document.getElementById("error-panel");
const errorDetail = document.getElementById("error-detail");
const cacheBtn    = document.getElementById("cache-btn");
const frame       = document.getElementById("app-frame");

/* ── Banner position helper (shifts down if banner visible) ── */
function updateLayout(){
  const bannerH = banner.classList.contains("show") ? banner.offsetHeight : 0;
  const topOffset = 36 + bannerH;
  document.getElementById("header").style.top = bannerH + "px";
  frame.style.top = topOffset + "px";
  loading.style.paddingTop = topOffset + "px";
  errorPanel.style.paddingTop = topOffset + "px";
}

function dismissBanner(){
  banner.classList.remove("show");
  updateLayout();
}

/* ── Format date ── */
function fmtDate(iso){
  if(!iso) return "—";
  const d = new Date(iso);
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})
        +" "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}

/* ── Show states ── */
function showLoading(msg, sub){
  loadingMsg.textContent = msg || "Fetching latest version from GitHub…";
  loadingSub.textContent = sub || "raw.githubusercontent.com";
  loading.classList.remove("hidden");
  errorPanel.classList.remove("show");
  frame.classList.remove("ready");
  reloadBtn.disabled = true;
  reloadBtn.classList.add("spinning");
  headerDot.className = "";
  updateLayout();
}

function showError(msg, detail){
  loading.classList.add("hidden");
  errorPanel.classList.add("show");
  document.getElementById("error-msg").textContent = msg;
  errorDetail.textContent = detail || "";
  reloadBtn.disabled = false;
  reloadBtn.classList.remove("spinning");
  headerDot.className = "error";
  versionBadge.textContent = "Offline";
  // Show cache button if we have something cached
  const cachedVer = localStorage.getItem(LS_VER);
  if(localStorage.getItem(LS_CACHE) && cachedVer){
    cacheBtn.textContent = "Open cached v" + cachedVer;
    cacheBtn.style.display = "block";
  }
  updateLayout();
}

function showApp(version, dateStr){
  loading.classList.add("hidden");
  errorPanel.classList.remove("show");
  frame.classList.add("ready");
  reloadBtn.disabled = false;
  reloadBtn.classList.remove("spinning");
  headerDot.className = "live";
  versionBadge.textContent = "v" + version;
  updatedLabel.textContent = "Updated: " + dateStr;
  updateLayout();
}

/* ── Load from cache ── */
function loadCache(){
  const html = localStorage.getItem(LS_CACHE);
  const ver  = localStorage.getItem(LS_VER) || "?";
  const date = localStorage.getItem(LS_DATE) || "—";
  if(!html){ showError("No cached version available",""); return; }
  mountHTML(html);
  showApp(ver, date + " (cached)");
  errorPanel.classList.remove("show");
}

/* ── Mount HTML into iframe via Blob URL ── */
function mountHTML(html){
  if(currentBlobUrl) URL.revokeObjectURL(currentBlobUrl);
  const blob = new Blob([html], {type:"text/html"});
  currentBlobUrl = URL.createObjectURL(blob);
  frame.src = currentBlobUrl;
}

/* ── Main launch sequence ── */
async function launch(){
  showLoading();

  // Fetch HTML and commit info in parallel
  const ts = Date.now();
  let html, commitDate;

  try {
    const [htmlRes, apiRes] = await Promise.allSettled([
      fetch(RAW_URL + "?ts=" + ts),
      fetch(API_URL)
    ]);

    // Handle HTML fetch
    if(htmlRes.status === "rejected" || !htmlRes.value.ok){
      const msg = htmlRes.status === "rejected"
        ? htmlRes.reason.message
        : "HTTP " + htmlRes.value.status;
      throw new Error(msg);
    }
    html = await htmlRes.value.text();

    // Handle API (non-critical — just for date display)
    if(apiRes.status === "fulfilled" && apiRes.value.ok){
      const commits = await apiRes.value.json();
      if(commits && commits[0]){
        commitDate = commits[0].commit.committer.date;
      }
    }
  } catch(err){
    showError(
      "Could not reach GitHub",
      "Error: " + err.message + ". Check your internet connection and try again."
    );
    return;
  }

  // Extract version from fetched HTML
  const match = html.match(/APP_VERSION\s*=\s*"([^"]+)"/);
  const fetchedVersion = match ? match[1] : "unknown";
  const lastVersion = localStorage.getItem(LS_VER);
  const dateStr = commitDate ? fmtDate(commitDate) : "—";

  // Show "updated" banner if version changed since last load
  if(lastVersion && lastVersion !== fetchedVersion){
    updateText.textContent = "⬆ Updated: v" + lastVersion + " → v" + fetchedVersion;
    banner.classList.add("show");
  } else {
    banner.classList.remove("show");
  }

  // Persist to localStorage
  try {
    localStorage.setItem(LS_VER,   fetchedVersion);
    localStorage.setItem(LS_CACHE, html);
    if(commitDate) localStorage.setItem(LS_DATE, dateStr);
  } catch(e){
    // localStorage quota exceeded (rare for ~70KB) — silently skip caching
    console.warn("vtm-launcher: could not cache to localStorage:", e.message);
  }

  mountHTML(html);
  showApp(fetchedVersion, dateStr);
}

// Boot
updateLayout();
launch();
</script>
</body>
</html>
